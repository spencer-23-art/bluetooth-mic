name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Import Certificate
      env:
        P12_BASE64: ${{ secrets.P12_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # Create temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # Import certificate
        CERTIFICATE_PATH=$RUNNER_TEMP/cert.p12
        python3 -c "import base64, os; data = os.environ['P12_BASE64'].encode('utf-8', 'ignore').replace(b'\xff\xfe', b'').replace(b'\xfe\xff', b'').replace(b'\x00', b'').strip(); open('$CERTIFICATE_PATH', 'wb').write(base64.b64decode(data))"
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # Install provisioning profile
        PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
        python3 -c "import base64, os; data = os.environ['PROVISION_PROFILE_BASE64'].encode('utf-8', 'ignore').replace(b'\xff\xfe', b'').replace(b'\xfe\xff', b'').replace(b'\x00', b'').strip(); open('$PROFILE_PATH', 'wb').write(base64.b64decode(data))"
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/3da5b62c-7acb-4db6-976e-1e20ac3061a0.mobileprovision

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project BluetoothMic.xcodeproj \
          -scheme BluetoothMic \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $RUNNER_TEMP/BluetoothMic.xcarchive \
          PROVISIONING_PROFILE_SPECIFIER="00008140-001C4C9A346A801CLQ0FME" \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          DEVELOPMENT_TEAM="64T2VBQ5CC" \
          CODE_SIGN_STYLE=Manual \
          -allowProvisioningUpdates \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/BluetoothMic.xcarchive \
          -exportPath $RUNNER_TEMP/export \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: BluetoothMic-IPA
        path: ${{ runner.temp }}/export/*.ipa
        retention-days: 30

    - name: Cleanup Keychain
      if: ${{ always() }}
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
