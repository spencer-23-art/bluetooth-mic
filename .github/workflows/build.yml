name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Import Certificate
      env:
        P12_BASE64: ${{ secrets.P12_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        LOG_FILE=./import_log.txt
        echo "=== Environment Diagnostics ===" >> $LOG_FILE
        echo "Raw P12_PASSWORD length: ${#P12_PASSWORD}" >> $LOG_FILE
        echo "Raw KEYCHAIN_PASSWORD length: ${#KEYCHAIN_PASSWORD}" >> $LOG_FILE
        echo "Raw P12_BASE64 length: ${#P12_BASE64}" >> $LOG_FILE
        echo "Raw PROVISION_PROFILE_BASE64 length: ${#PROVISION_PROFILE_BASE64}" >> $LOG_FILE
        
        echo "=== Creating Keychain ===" >> $LOG_FILE
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH >> $LOG_FILE 2>&1
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH >> $LOG_FILE 2>&1
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH >> $LOG_FILE 2>&1

        echo "=== Decoding P12 ===" >> $LOG_FILE
        CERTIFICATE_PATH=$RUNNER_TEMP/cert.p12
        python3 -c "
        import base64, os, sys
        try:
            val = os.environ.get('P12_BASE64', '')
            print('Raw P12 secret length:', len(val))
            data = val.encode('utf-8', 'ignore').replace(b'\xff\xfe', b'').replace(b'\xfe\xff', b'').replace(b'\x00', b'').strip()
            print('Cleaned P12 base64 length:', len(data))
            decoded = base64.b64decode(data)
            print('Decoded P12 length:', len(decoded))
            open('$CERTIFICATE_PATH', 'wb').write(decoded)
            print('P12 saved successfully.')
        except Exception as e:
            print('P12 Decode Error:', str(e))
            sys.exit(1)
        " >> $LOG_FILE 2>&1

        echo "=== Importing Certificate ===" >> $LOG_FILE
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH >> $LOG_FILE 2>&1
        
        echo "=== Partition List ===" >> $LOG_FILE
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH >> $LOG_FILE 2>&1
        
        echo "=== List Keychain ===" >> $LOG_FILE
        security list-keychain -d user -s $KEYCHAIN_PATH >> $LOG_FILE 2>&1

        echo "=== Decoding Provisioning Profile ===" >> $LOG_FILE
        PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
        python3 -c "
        import base64, os, sys
        try:
            val = os.environ.get('PROVISION_PROFILE_BASE64', '')
            print('Raw Profile secret length:', len(val))
            data = val.encode('utf-8', 'ignore').replace(b'\xff\xfe', b'').replace(b'\xfe\xff', b'').replace(b'\x00', b'').strip()
            print('Cleaned Profile base64 length:', len(data))
            decoded = base64.b64decode(data)
            print('Decoded Profile length:', len(decoded))
            open('$PROFILE_PATH', 'wb').write(decoded)
            print('Profile saved successfully.')
        except Exception as e:
            print('Profile Decode Error:', str(e))
            sys.exit(1)
        " >> $LOG_FILE 2>&1

        echo "=== Installing Profile ===" >> $LOG_FILE
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles >> $LOG_FILE 2>&1
        cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/3da5b62c-7acb-4db6-976e-1e20ac3061a0.mobileprovision >> $LOG_FILE 2>&1

    - name: Upload Debug Log
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: import-debug-log
        path: import_log.txt

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project BluetoothMic.xcodeproj \
          -scheme BluetoothMic \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $RUNNER_TEMP/BluetoothMic.xcarchive \
          PROVISIONING_PROFILE_SPECIFIER="00008140-001C4C9A346A801CLQ0FME" \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          DEVELOPMENT_TEAM="64T2VBQ5CC" \
          CODE_SIGN_STYLE=Manual \
          -allowProvisioningUpdates \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/BluetoothMic.xcarchive \
          -exportPath $RUNNER_TEMP/export \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: BluetoothMic-IPA
        path: ${{ runner.temp }}/export/*.ipa
        retention-days: 30

    - name: Cleanup Keychain
      if: ${{ always() }}
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
